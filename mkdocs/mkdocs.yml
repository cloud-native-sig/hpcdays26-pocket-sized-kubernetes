site_name: Pocket-Sized Kubernetes 
nav:
- introduction.md
- designing-a-cluster.md
- Lesson 1 — Building your cluster: lesson1.md
- Lesson 2 - Using your cluster:
  - Introduction: lesson2.md
  - Exercise 1: lesson2-exercise1.md
  - Exercise 2: lesson2-exercise2.md
- extra-reading.md
theme: 
  name: material
  palette:
    primary: teal
    accent: indigo
  logo: assets/CN-SIG-logo.png
  features: 
    - navigation.instant
    - navigation.tracking
    - navigation.footer
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - footnotes
  - attr_list
  - md_in_html
copyright: © Cloud Native SIG 2026
repo_url: https://github.com/cloud-native-sig/hpcdays26-pocket-sized-kubernetes
edit_uri: edit/main/tutorial
site_url: https://cloud-native-sig.github.io/hpcdays26-pocket-sized-kubernetes/
