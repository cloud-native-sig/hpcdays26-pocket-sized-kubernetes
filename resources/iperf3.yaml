apiVersion: apps/v1
kind: Deployment

metadata:
  name: iperf-server
  namespace: resource-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: iperf-server

  template:
    metadata:
      labels:
        app: iperf-server

    spec:
      containers:
        - name: iperf3

          image: workshop-tools:arm64
          imagePullPolicy: IfNotPresent

          command:
            - iperf3

          args:
            - -s

          ports:
            - containerPort: 5201

---
apiVersion: v1
kind: Service
metadata:
  name: iperf3-service
  namespace: resource-demo

spec:
  selector:
    app: iperf-server

  ports:
  - port: 5201
    targetPort: 5201

  type: ClusterIP