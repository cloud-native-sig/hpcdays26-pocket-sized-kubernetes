apiVersion: apps/v1
kind: Deployment

metadata:
  name: memory-demo
  namespace: resource-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: memory-demo

  template:
    metadata:
      labels:
        app: memory-demo

    spec:
      containers:
        - name: stress-ng

          image: stress-ng

          command:
            - stress-ng

          args:
            - --vm
            - "1"
            - --vm-bytes
            - "256M"
            - --vm-keep
            - --timeout
            - "300s"

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"

            limits:
              memory: "128Mi"
              cpu: "500m"