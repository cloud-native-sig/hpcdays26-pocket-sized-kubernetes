apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-demo
  namespace: nginx

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "<h1>$(hostname)</h1>" >> /usr/share/nginx/html/index.html
              nginx -g 'daemon off;'
          volumeMounts:
            - name: web-storage
              mountPath: /usr/share/nginx/html

      volumes:
        - name: web-storage
          persistentVolumeClaim:
            claimName: nginx-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-pvc
  namespace: nginx

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 500Mi
