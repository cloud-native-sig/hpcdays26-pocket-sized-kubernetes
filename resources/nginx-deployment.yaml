apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: nginx
spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - |
            echo "<h1>$(hostname)</h1>" >> /usr/share/nginx/html/index.html
            nginx -g 'daemon off;'
        ports:
        - containerPort: 80