apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: nginx
spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80